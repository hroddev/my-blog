<div class="flex items-center w-full py-4 px-2 bg-[#4c566a] dark:bg-[#4c566a]" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  
  <!-- Lado Izquierdo: Logo e Icono -->
  <div class="flex items-center flex-none">
    <a href="{{ "https://hrod.dev" | relLangURL }}" class="flex items-center nozoom" style="text-decoration: none;">
      <!-- Icono prompt > -->
      <svg width="24" height="24" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 12px; display: block;">
        <defs>
          <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#bf616a"/>
            <stop offset="50%" stop-color="#d08770"/>
            <stop offset="100%" stop-color="#ebcb8b"/>
          </linearGradient>
        </defs>
        <path d="M12 10 L35 30 L12 50" stroke="url(#aurora)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <!-- Texto hrod.dev -->
      <span style="font-size: 1.25rem; letter-spacing: -0.025em; color: white;">
        <strong style="font-weight: 700;">hrod</strong><span style="font-weight: 300; opacity: 0.5;">.dev</span>
      </span>
    </a>
  </div>

  <!-- Lado Derecho: Navegación + Sociales -->
  <div class="flex items-center ms-auto">
    
    <!-- Navegación forzando espaciado entre items -->
    <nav class="hidden md:flex items-center">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relLangURL }}" 
           style="margin-left: 2.5rem; font-size: 0.875rem; font-weight: 400; color: #d8dee9; text-decoration: none;" 
           class="hover:text-white transition-colors">
          {{ .Name }}
        </a>
      {{ end }}
    </nav>

    <!-- Separador vertical y Sociales -->
    <div class="hidden md:flex items-center" style="margin-left: 2rem; padding-left: 2rem; border-left: 1px solid rgba(216, 222, 233, 0.2);">
      <a href="https://github.com/hroddev/my-blog" target="_blank" style="color: #d8dee9; margin-right: 1rem;" class="hover:text-white">
        {{ partial "icon.html" "github" }}
      </a>
      <a href="https://linkedin.com/in/hroddev" target="_blank" style="color: #d8dee9;" class="hover:text-white">
        {{ partial "icon.html" "linkedin" }}
      </a>
    </div>

    <!-- Buscador y Switcher -->
    <div class="flex items-center" style="margin-left: 2rem;">
      <button id="search-button" style="color: #d8dee9; margin-right: 1rem; background: none; border: none; cursor: pointer;">
        {{ partial "icon.html" "search" }}
      </button>
      <!-- <button id="appearance-switcher" style="color: #d8dee9; background: none; border: none; cursor: pointer;"> -->
      <!--   {{ partial "icon.html" "moon" }} -->
      <!-- </button> -->
    </div>

  </div>
</div>
