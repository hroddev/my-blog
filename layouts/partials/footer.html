<!-- layouts/partials/footer.html -->
<footer class="mt-32 mb-8 pb-8 opacity-80 w-full">
  <div class="flex flex-col md:flex-row items-center justify-between text-sm text-nord4">
    
    <!-- Info y Enlaces Sociales (Izquierda) -->
    <div class="flex items-center gap-4 mb-4 md:mb-0">
      <span class="font-semibold tracking-wide">{{ .Site.Params.author.name | default "Hector Rodriguez" }}</span>
      <span class="text-nord3 opacity-50">|</span>
      <div class="flex items-center gap-3">
        {{ range .Site.Params.author.links }}
          {{ range $name, $url := . }}
            <a href="{{ $url }}" target="_blank" rel="noopener noreferrer" 
               class="w-4 h-4 text-nord4 hover:text-nord8 transition-colors"
               aria-label="{{ $name }}" title="{{ $name }}">
              {{ partial "icon.html" $name }}
            </a>
          {{ end }}
        {{ end }}
      </div>
    </div>

    <!-- Copyright y Powered by (Derecha) -->
    <div class="flex items-center gap-2 text-nord3 text-xs sm:text-sm">
      <span>&copy; {{ now.Format "2006" }} {{ .Site.Title }}</span>
      <span class="hidden sm:inline">&middot; Hecho con Hugo</span>
    </div>

  </div>
</footer>
